name: Secrets to Artifact

on:
  push:
    branches:
      - get-secret

jobs:
  upload-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Write secret to file
        run: |
          echo "${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}" > secret-output.txt
          echo "${{ secrets.DO_REGISTRY_NAME }}" >> secret-output.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: secret-artifact
          path: secret-output.txt
          retention-days: 1
